<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresiboFlow - Workflow Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .canvas-dot-bg {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .node {
            cursor: move;
            transition: transform 0.1s;
        }
        .node:active { transform: scale(1.02); }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col">
    <nav class="h-16 bg-white border-b flex items-center px-6 justify-between">
        <div class="flex items-center gap-4">
            <a href="index.html" class="p-2 hover:bg-slate-100 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <h1 class="font-bold text-slate-800">Workflow Canvas</h1>
        </div>
        <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold shadow-sm hover:bg-blue-700 transition-all">Save Flow</button>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <!-- Palette -->
        <aside class="w-72 bg-white border-r p-6 overflow-y-auto">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Patient Journey Nodes</h2>
            <div class="space-y-3">
                <div class="p-4 border rounded-xl bg-slate-50 cursor-grab active:cursor-grabbing hover:border-blue-500">
                    <p class="font-bold text-slate-700 text-sm">Registration</p>
                    <p class="text-xs text-slate-500">Collect patient details</p>
                </div>
                <div class="p-4 border rounded-xl bg-slate-50 cursor-grab active:cursor-grabbing hover:border-emerald-500">
                    <p class="font-bold text-slate-700 text-sm">Vitals Check</p>
                    <p class="text-xs text-slate-500">BP, Weight, Temperature</p>
                </div>
                <div class="p-4 border rounded-xl bg-slate-50 cursor-grab active:cursor-grabbing hover:border-amber-500">
                    <p class="font-bold text-slate-700 text-sm">GP Consultation</p>
                    <p class="text-xs text-slate-500">Doctor review & exam</p>
                </div>
                <div class="p-4 border rounded-xl bg-slate-50 cursor-grab active:cursor-grabbing hover:border-purple-500">
                    <p class="font-bold text-slate-700 text-sm">Pharmacy</p>
                    <p class="text-xs text-slate-500">Dispense prescription</p>
                </div>
            </div>
        </aside>

        <!-- Canvas -->
        <main class="flex-1 canvas-dot-bg relative" id="canvas">
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <p class="text-slate-400 font-medium">Drag nodes here to start building</p>
            </div>
        </main>
    </div>
</body>
</html>
