services:
  presiboflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../presiboflow:/app/presiboflow
    network_mode: host # LiveKit agents often need host networking for WebRTC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

