name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller build/presiboflow.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PresiboFlow-Windows
          path: dist/PresiboFlow.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: PresiboFlow-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: PresiboFlow.exe
          name: "Presibo Flow Release ${{ github.ref_name }}"
          body: |
            ## Intelligent Clay Update
            This release includes the latest "Intelligent Clay" features for Presibo Flow.
            - Real-time Molding Support
            - Premium Dark Theme UI
            - Dynamic Workflow Canvas
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
